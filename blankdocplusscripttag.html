<!DOCTYPE html>
<html>
    <head>
        <title>Rock Paper Scissors</title>
    </head>
    <body>
        <h1>Rock Paper Scissors</h1>
    </body>
    <p>Rock Paper Scissors!:</p>

    <script>

    function computerPlay() {
        let cpuPlay = Math.random();

        if (cpuPlay < 0.3) {
            return `Rock`; 
        } else if ((cpuPlay > 0.3) && (cpuPlay < 0.6 )) {
            return 'Paper';
        } else {
            return 'Scissors';
        }
        // The function plays the CPU, a random selection of Rock, Paper, or Scissors.
    }
    computerPlay(); // Call the function


 var playerSelection = prompt("Enter your choice:");
 computerSelection = computerPlay().toLowerCase();

    function playRound(playerSelection, computerSelection){

        if ((computerSelection == "rock") && (playerSelection == "rock")) {
            return "tie"; 
        } else if ((computerSelection == "paper") && (playerSelection == "paper")) {
            return "tie"; 
        } else if ((computerSelection == "scissors") && (playerSelection == "scissors")) {
            return "tie"; 
        } else if ((computerSelection == "rock") && (playerSelection == "scissors")) {
            return "loser";
        } else if ((computerSelection == "paper") && (playerSelection == "rock")) {
            return "loser";
        } else if ((computerSelection == "scissors") && (playerSelection == "paper")) {
            return "loser"; 
        } else if ((computerSelection == "rock") && (playerSelection == "paper")) {
            return "winner";  
        } else if ((computerSelection == "paper") && (playerSelection == "scissors")) {
            return "winner"; 
        } else if ((computerSelection == "scissors") && (playerSelection == "rock")) {
            return "winner";
        } else {
            return "Error, no winner"; 
      
        }
        // The function plays 1 round and declares a winner or a tie.
    
    playRound(); // Call the function
    
    }

console.log(playRound(playerSelection, computerSelection));

    //Write a function that plays a single round of Rock Paper Scissors. 
    //The function should take two parameters - the playerSelection and computerSelection - and then return a string that declares the winner of the round like so: "You Lose! Paper beats Rock"
//Make your function case insensitive (so users can input rock, ROCK, RocK or any other variation)








</script>

</body>
</html>
